        // 1. Definimos la Clase con Mayúscula (PascalCase)
        class Datos {
            
            nombreUsuarios() {
                const servicio = new XMLHttpRequest();
                const contenedor = document.getElementById("contenedor");

                // Limpiamos el contenedor antes de realizar la nueva carga
                contenedor.innerHTML = "";

                // Configuramos la petición GET a la API
                servicio.open('GET', 'https://jsonplaceholder.typicode.com/users', true);

                // Definimos qué hacer cuando se reciban los datos
                servicio.onload = function() {
                    if (servicio.status === 200) {
                        const data = JSON.parse(servicio.response);
                        
                        data.forEach(usuario => {
                            contenedor.innerHTML += `
                                <div class="card mb-3">
                                    <div class="card-body">
                                        <h5 class="card-title">
                                            ${usuario.name}
                                        </h5>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        console.error("Error al cargar los datos de la API");
                    }
                };

                // Enviamos la petición activamente
                servicio.send();                
            }

            // === NUEVO MÉTODO: Pedir nombre por prompt y filtrar datos en consola ===
            buscarUsuarioPorNombre() {
                // 1. Capturamos el nombre ingresado por el usuario
                let nombreBuscado = prompt("Ingrese el nombre completo del usuario a consultar:");

                // Verificación de seguridad: si el usuario canceló el prompt o lo dejó vacío
                if (nombreBuscado === null || nombreBuscado.trim() === "") {
                    console.log("Búsqueda cancelada o vacía.");
                    return;
                }

                const servicio = new XMLHttpRequest();
                servicio.open('GET', 'https://jsonplaceholder.typicode.com/users', true);
                
                servicio.onload = function() {
                    if (servicio.status === 200) {
                        const data = JSON.parse(servicio.response); // Arreglo de usuarios

                        // 2. Buscamos al usuario en el arreglo usando .find()
                        // Convertimos ambos textos a minúsculas (.toLowerCase()) para evitar problemas con mayúsculas
                        const usuarioEncontrado = data.find(usuario => {
                            return usuario.name.toLowerCase().includes(nombreBuscado.toLowerCase());
                        });

                        // 3. Evaluamos si el usuario realmente existía en la API
                        if (usuarioEncontrado) {
                            console.log("¡Usuario encontrado con éxito!");
                            console.log(`Nombre: ${usuarioEncontrado.name}`);
                            console.log(`Username: ${usuarioEncontrado.username}`);
                            console.log(`Email: ${usuarioEncontrado.email}`);
                            console.log("-------------------------------------------------");
                        } else {
                            console.log(`No se encontró ningún usuario que coincida con: "${nombreBuscado}"`);
                        }
                    } else {
                        console.error("Error al conectar con la API");
                    }
                };

                servicio.send();
            }

            nombreCompañias() {

                nombreUsuariosOrdenado() {
                const servicio = new XMLHttpRequest();
                const contenedor = document.getElementById("contenedor");

                // Limpiamos el contenedor antes de realizar la nueva carga
                contenedor.innerHTML = "";

                // Configuramos la petición GET a la API

                // Definimos qué hacer cuando se reciban los datos

                        const data = JSON.parse(servicio.response);

                // 1. Extraemos SOLO los nombres en un nuevo array: ["Leanne", "Ervin", ...]
                const soloNombres = data.map(usuario => usuario.name);

                // 2. Ordenamos el array de texto puro (el comportamiento por defecto es de la A a la Z)
                soloNombres.sort();

                // 3. Renderizamos directamente los nombres del nuevo array
                soloNombres.forEach(nombre => {
                    contenedor.innerHTML += `
                        <div class="card mb-3">

            }
